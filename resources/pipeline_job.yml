resources:
  jobs:
    ingestion_job:
      name: Ingestion - ${bundle.target}

      trigger:
        file_arrival:
          url: ${var.volume_path}
          min_time_between_triggers_seconds: 600

      tasks:
        - task_key: setup_tables
          timeout_seconds: 600
          max_retries: 1
          min_retry_interval_millis: 30000
          notebook_task:
            notebook_path: ../src/setup_tables.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              checkpoint_table: ${var.checkpoint_table}
              parsed_table: ${var.parsed_table}
              ai_query_table: ${var.ai_query_table}

        - task_key: parse_files
          depends_on:
            - task_key: setup_tables
          timeout_seconds: 3600
          max_retries: 1
          min_retry_interval_millis: 60000
          notebook_task:
            notebook_path: ../src/parse_files.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              volume_path: ${var.volume_path}
              checkpoint_table: ${var.checkpoint_table}
              parsed_table: ${var.parsed_table}

        - task_key: trigger_processing
          depends_on:
            - task_key: parse_files
          run_job_task:
            job_id: ${resources.jobs.processing_job.id}

      max_concurrent_runs: 1

      notification_settings:
        no_alert_for_skipped_runs: true

      tags:
        project: pipeline_integrity
        environment: ${bundle.target}

    processing_job:
      name: Processing - ${bundle.target}

      tasks:
        - task_key: ai_query_processing
          timeout_seconds: 7200
          max_retries: 1
          min_retry_interval_millis: 60000
          notebook_task:
            notebook_path: ../src/ai_query_processing.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              parsed_table: ${var.parsed_table}
              ai_query_table: ${var.ai_query_table}

        - task_key: create_kie_view
          depends_on:
            - task_key: ai_query_processing
          timeout_seconds: 600
          max_retries: 1
          min_retry_interval_millis: 30000
          notebook_task:
            notebook_path: ../src/create_kie_view.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              ai_query_table: ${var.ai_query_table}
              kie_view_name: ${var.kie_view_name}

        - task_key: export_to_excel
          depends_on:
            - task_key: create_kie_view
          timeout_seconds: 1800
          max_retries: 1
          min_retry_interval_millis: 30000
          notebook_task:
            notebook_path: ../src/export_to_excel.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
              kie_view_name: ${var.kie_view_name}
              export_volume_path: ${var.export_volume_path}

      max_concurrent_runs: 1

      notification_settings:
        no_alert_for_skipped_runs: true

      tags:
        project: pipeline_integrity
        environment: ${bundle.target}
